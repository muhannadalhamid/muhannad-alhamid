backend:
  name: git-gateway
  branch: main

media_folder: "static/images"
public_folder: "/images"

collections:
    - name: "posts"
    label: "📝 مقالات ونصوص"
    folder: "content/posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
            - {label: "العنوان", name: "title", widget: "string"}
            - {label: "تاريخ النشر", name: "date", widget: "datetime"}
            - {label: "التصنيف", name: "category", widget: "select", options: ["مقال", "خاطرة", "قصيدة", "قصة قصيرة"], default: "مقال"}
            - {label: "النص", name: "body", widget: "markdown"}

    - name: "books"
    label: "📚 كتب وفصول"
    folder: "content/books"
    create: true
    slug: "{{slug}}"
    fields:
            - {label: "اسم الكتاب", name: "book_title", widget: "string"}
            - {label: "رقم الفصل", name: "chapter", widget: "number", value_type: "int"}
            - {label: "عنوان الفصل", name: "title", widget: "string"}
            - {label: "تاريخ النشر", name: "date", widget: "datetime"}
            - {label: "غلاف الكتاب", name: "cover", widget: "image", required: false}
            - {label: "محتوى الفصل", name: "body", widget: "markdown"}
