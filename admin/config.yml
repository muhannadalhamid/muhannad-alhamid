backend:
  name: git-gateway
  branch: main

media_folder: "static/images"
public_folder: "/images"

collections:
    - name: "post"
    label: "النصوص"
    folder: "content/posts"
    create: true
    slug: "{{slug}}"
    fields:
            - {label: "العنوان", name: "title", widget: "string"}
            - {label: "النص", name: "body", widget: "markdown"}
